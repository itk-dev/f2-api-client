services:
    phpfpm:
        image: itkdev/php8.3-fpm:latest
        user: ${COMPOSE_USER:-deploy}
        profiles:
            - dev
        environment:
            - PHP_XDEBUG_MODE=${PHP_XDEBUG_MODE:-off}
            - PHP_IDE_CONFIG=serverName=localhost
        volumes:
            - .:/app
        # https://docs.docker.com/compose/how-tos/environment-variables/set-environment-variables/#additional-information-1
        env_file:
            - path: .env.local
              required: false

    # Code checks tools
    markdownlint:
        image: itkdev/markdownlint
        profiles:
            - dev
        volumes:
            - ./:/md

    prettier:
        # Prettier does not (yet, fcf.
        # https://github.com/prettier/prettier/issues/15206) have an official
        # docker image.
        # https://hub.docker.com/r/jauderho/prettier is good candidate (cf. https://hub.docker.com/search?q=prettier&sort=updated_at&order=desc)
        image: jauderho/prettier
        profiles:
            - dev
        volumes:
            - ./:/work

    # https://mago.carthage.software/latest/en/guide/installation/#docker
    mago:
        image: ghcr.io/carthage-software/mago
        profiles:
            - dev
        volumes:
            - ./:/app
        working_dir: /app
